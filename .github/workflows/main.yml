name: Build YouProMod IPA

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: "URL to the decrypted IPA file"
        required: true
        type: string

      display_name:
        description: "App Name"
        default: "YouTube"
        required: true
        type: string

      bundle_id:
        description: "Bundle ID"
        default: "com.google.ios.youtube"
        required: true
        type: string

      demc:
        description: "Integrate DontEatMyContent"
        default: true
        required: false
        type: boolean        

      #ytvid:
      #  description: "Integrate YTVideoErrorAlert"
      #  default: true
      #  required: false
      #  type: boolean

      youpro_version:
        description: "Which YouPro dylib to inject"
        default: "beta3"
        required: true
        type: choice
        options:
          - beta1
          - beta3

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build YouProMod IPA
    runs-on: macos-latest
    permissions:
      contents: write

    env:
      INPUT_DEMC: ${{ inputs.demc }}
      INPUT_IPA_URL: ${{ inputs.ipa_url }}
      INPUT_DISPLAY_NAME: ${{ inputs.display_name }}
      INPUT_BUNDLE_ID: ${{ inputs.bundle_id }}
      INPUT_YOUPRO_VERSION: ${{ inputs.youpro_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Hide sensitive inputs
        uses: levibostian/action-hide-sensitive-inputs@v1
        with:
          exclude_inputs: bundle_id,display_name,youpro_version

      - name: Download and validate IPA
        run: bash scripts/download_and_validate_ipa.sh

      - name: Prepare IPA metadata
        run: bash scripts/prepare_ipa.sh

      - name: Install dependencies
        run: brew install make ldid swiftlint jq pipx

      - name: Set PATH and THEOS
        run: |
          echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"
          echo "THEOS=${{ github.workspace }}/theos" >> "$GITHUB_ENV"

      - name: Cache Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: theos
          key: ${{ runner.os }}-theos-v3
          restore-keys: |
            ${{ runner.os }}-theos-

      - name: Clone Theos
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: git clone --quiet --depth=1 --recurse-submodules https://github.com/theos/theos.git

      - name: Cache iOS SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos/sdks
          key: ${{ runner.os }}-ios-sdk-18.6-v2
          restore-keys: |
            ${{ runner.os }}-ios-sdk-

      - name: Download iOS SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          rm -rf iOS-SDKs
          git clone --quiet --depth=1 -n --filter=tree:0 https://github.com/Tonwalter888/iOS-SDKs.git
          cd iOS-SDKs
          git sparse-checkout set --no-cone iPhoneOS18.6.sdk
          git checkout
          mkdir -p "$THEOS/sdks"
          mv *.sdk "$THEOS/sdks"

      - name: Setup environment
        run: bash scripts/setup_env.sh

      - name: Get tweak hashes
        run: bash scripts/get_tweak_hashes.sh

      - name: Cache tweaks
        uses: actions/cache@v4
        with:
          path: |
            YouMod
            YTVideoOverlay
            YouPiP
            YouMute
            YouChooseQuality
            DontEatMyContent
            YouGroupSettings
            YouSpeed
            tweaks/KhmerTopButton
            tweaks/YouProLangFix
            tweaks/YouProb2LangFix
          key: ${{ runner.os }}-youpromod-v13-${{ inputs.youpro_version }}-${{ hashFiles('tweak_hashes.txt', '.github/workflows/main.yml', 'scripts/*.sh') }}
          restore-keys: |
            ${{ runner.os }}-youpromod-v13-${{ inputs.youpro_version }}-
            ${{ runner.os }}-youpromod-v13-

      - name: Clone tweak repositories
        run: bash scripts/clone_tweaks.sh

      - name: Apply tweak patches
        run: bash scripts/patch_tweaks.sh

      - name: Build tweaks
        run: bash scripts/build_tweaks.sh

      - name: Inject tweaks into IPA
        run: bash scripts/package_ipa.sh

      - name: Restore original PlugIns and Extensions
        run: bash scripts/restore_plugins_extensions.sh

      - name: Verify final IPA
        run: |
          OUTPUT_NAME="YouProMod-${INPUT_YOUPRO_VERSION}-${GITHUB_RUN_NUMBER}.ipa"
          test -f "$OUTPUT_NAME" || { echo "::error::$OUTPUT_NAME not found"; exit 1; }
          file "$OUTPUT_NAME"
          ls -lh "$OUTPUT_NAME"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouProMod-${{ inputs.youpro_version }}-${{ github.run_number }}
          path: YouProMod-${{ inputs.youpro_version }}-${{ github.run_number }}.ipa
          if-no-files-found: error

      - name: Delete old draft releases
        run: |
          gh release list --limit 20 --json tagName,isDraft \
            | jq -r '.[] | select(.isDraft==true) | .tagName' \
            | xargs -I {} gh release delete {} -y || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: youpromod-${{ github.run_number }}
          name: YouProMod (${{ inputs.youpro_version }} - ${{ github.run_number }})
          files: YouProMod-${{ inputs.youpro_version }}-${{ github.run_number }}.ipa
          draft: true
          fail_on_unmatched_files: true
          overwrite_files: true

      - name: Job summary
        run: |
          echo "### YouProMod IPA Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Draft release: https://github.com/${{ github.repository }}/releases" >> "$GITHUB_STEP_SUMMARY"
